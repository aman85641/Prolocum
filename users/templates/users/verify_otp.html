{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP – ProLocum</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'users/css/login.css' %}">
    <style>
        .otp-input {
            letter-spacing: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            padding-left: 20px !important;
        }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
    </a>

    <div class="card">

        <div class="logo-wrap">
            <div class="logo-icon">
                <img src="{% static 'users/images/Black_and_White_Circular_Art___Design_Logo-removebg-preview.png' %}" alt="ProLocum Logo">
            </div>
            <div class="logo-name">Pro<span>Locum</span></div>
        </div>

        <div class="form-section">
            <h2 style="font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 8px; text-align: center;">Verify OTP</h2>
            <p class="form-hint" style="text-align: center; margin-bottom: 24px;">
                We've sent a 6-digit code to <br>
                <strong style="color: #111827;">+91 {{ mobile }}</strong>
            </p>

            {% if error %}
            <div class="error-msg" style="margin-bottom: 20px;">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/otp/verify/">
                {% csrf_token %}
                
                <div class="input-wrap">
                    <input type="text" name="otp" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code" required autofocus>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Verify & Continue</button>
            </form>
        </div>

        <!-- <div style="text-align: center; margin-top: 24px;">
            <p style="font-size: 13px; color: #6b7280;">
                Didn't receive the code? <br>
                <a href="javascript:location.reload()" style="color: #534AB7; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 8px;">Resend OTP</a>
            </p>
        </div> -->

    </div>

</body>
</html>
