{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account – ProLocum</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'users/css/login.css' %}">
</head>
<body>

    <a href="javascript:history.back()" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
    </a>

    <div class="card">

        <div class="logo-wrap">
            <div class="logo-icon">
                <img src="{% static 'users/images/Black_and_White_Circular_Art___Design_Logo-removebg-preview.png' %}" alt="ProLocum Logo">
            </div>
            <div class="logo-name">Pro<span>Locum</span></div>
            <p class="logo-sub">Register as {{ role|title }}</p>
        </div>

        <div class="form-section">
            <h2 style="font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 8px; text-align: center;">Get Started</h2>
            <p class="form-hint" style="text-align: center; margin-bottom: 24px;">Enter your mobile number to receive a verification OTP</p>

            {% if error %}
            <div class="error-msg" style="margin-bottom: 20px;">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="input-wrap">
                    <span class="input-prefix">+91</span>
                    <input type="tel" name="mobile" placeholder="Mobile Number" maxlength="10" inputmode="numeric" autocomplete="tel" required>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Send OTP to Register</button>
            </form>
        </div>

        <div class="divider"><span>already have an account?</span></div>

        <a href="{% url 'login' role %}" class="btn btn-secondary">Back to Login</a>
<!-- 
        <p style="font-size: 12px; color: #9ca3af; text-align: center; margin-top: 24px; line-height: 1.5;">
            By continuing, you agree to ProLocum's <br>
            <a href="#" style="color: #534AB7; text-decoration: none; font-weight: 600;">Terms of Service</a> and <a href="#" style="color: #534AB7; text-decoration: none; font-weight: 600;">Privacy Policy</a>
        </p> -->

    </div>

</body>
</html>
