{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Type – MedBridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'users/css/doctor_type.css' %}">
</head>
<body>

    <a href="{% url 'home' %}" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
    </a>

    <div class="card">

        <!-- Logo -->
        <div class="logo-wrap">
            <div class="logo-icon">
            <img src="{% static 'users/images/Black_and_White_Circular_Art___Design_Logo-removebg-preview.png' %}" alt="logo">
        </div>
        <div class="logo-name">Pro<span>Locum</span></div>
        </div>

        <!-- Label -->
        <p class="section-label"> &nbsp;Doctor — Select Your Degree</p>

        <!-- Sub-role buttons -->
        <a href="{% url 'login' 'doctor' %}?type=mbbs" class="role-btn active">
            <div class="btn-left">
                <div class="btn-emoji"></div>
                <div class="btn-info">
                    <span class="btn-title">MBBS</span>
                    <!-- <span class="btn-sub">Bachelor of Medicine & Surgery</span> -->
                </div>
            </div>
            <div class="btn-arrow">→</div>
        </a>

        <a href="{% url 'login' 'doctor' %}?type=bams" class="role-btn">
            <div class="btn-left">
                <div class="btn-emoji"></div>
                <div class="btn-info">
                    <span class="btn-title">BAMS / BHMS</span>
                    <!-- <span class="btn-sub">Ayurvedic & Homeopathic Medicine</span> -->
                </div>
            </div>
            <div class="btn-arrow">→</div>
        </a>

        <!-- Footer -->
        <p class="footer-tag">The Bridge to Uninterrupted Care</p>

    </div>

</body>
</html>
